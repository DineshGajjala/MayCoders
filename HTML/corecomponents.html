<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
    1.Tag
    2.Element
    3.attributes
    
    Tag:tag is predefined keyword enclosed in angle brackets
    
    why tags:
    !.to tell to the browser what to display
    2. to define the structure of the web page
    3. to give the meaning to the content
    syntax:
    <tagname>content</tagname>
    types of tags:
    1.paired tags
    2.single tag:meta,br,img,hr
    1.semantic tags
    2.non-semantic tags
    
Element:opening tag+content+closing tag

    1.Blockline element
        takes full width
        starts of new line
        eg:h1 to h6,p,div,section,header,footer,
    2.Inline element
        takes the width how much it needs
        eg:a,img,span
    3. void element
        does not have a closing tag
        eg:br,hr,img
attributes:additional information about an element
    global attributes:can be used with any HTML element
    example: id, class, style, title, data-*
    element-specific attributes:can only be used with specific HTML elements
    example: id, class, style
    -->
    </body>
</html>
